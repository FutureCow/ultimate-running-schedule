plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "nl.ultimaterunning.ultimate_running"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties['keyAlias'] ?: System.getenv('KEY_ALIAS')
            keyPassword = keystoreProperties['keyPassword'] ?: System.getenv('KEY_PASSWORD')
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : (System.getenv('KEYSTORE_PATH') ? file(System.getenv('KEYSTORE_PATH')) : null)
            storePassword = keystoreProperties['storePassword'] ?: System.getenv('KEY_STORE_PASSWORD')
        }
    }

    defaultConfig {
        applicationId = "nl.ultimaterunning.ultimate_running"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}
